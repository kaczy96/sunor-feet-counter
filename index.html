<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8" />
<title>Sunor Feet Counter</title>
<style>
@font-face {
  font-family: 'Friz Quadrata';
  src: local('Friz Quadrata'), local('FrizQuadrata');
}

body {
  margin:0;
  background:#0f0f10;
  color:#e6e6e6;
  font-family:'Friz Quadrata', serif;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  min-height:100vh;
  text-align:center;
}

h1{
  font-size:56px;
  margin-bottom:20px;
  letter-spacing:2px;
}

img{
  width:420px;
  max-width:80vw;
  border-radius:18px;
  margin:25px 0;
  box-shadow:0 0 40px rgba(0,0,0,0.7);
}

#counter{
  font-size:72px;
  margin:20px 0;
}

.buttons{
  display:flex;
  gap:15px;
}

button{
  font-family:'Friz Quadrata', serif;
  font-size:22px;
  padding:14px 30px;
  border-radius:14px;
  border:none;
  background:#6b4cff;
  color:white;
  cursor:pointer;
  transition:transform .1s ease, box-shadow .1s ease;
  box-shadow:0 6px 18px rgba(0,0,0,0.5);
}

button:hover{
  transform:scale(1.05);
}

button:active{
  transform:scale(0.97);
}

.reset{
  background:#ff4c4c;
}
</style>
</head>
<body>

<h1>Sunor Feet Counter</h1>

<img src="feet.png" alt="Feet image" />

<div id="counter">0</div>

<div class="buttons">
  <button onclick="addFeet()">Feet mentioned</button>
  <button class="reset" onclick="resetCounter()">Reset</button>
</div>

<script>
function getCookie(name){
  const cookies = document.cookie.split(';');
  for (let c of cookies){
    const [key,val] = c.trim().split('=');
    if(key === name) return val;
  }
  return null;
}

function setCookie(name,value,days){
  const d = new Date();
  d.setTime(d.getTime() + (days*24*60*60*1000));
  document.cookie = `${name}=${value}; expires=${d.toUTCString()}; path=/`;
}

let count = 0;

window.addEventListener('DOMContentLoaded', () => {
  const saved = parseInt(getCookie('feetCounter'));
  if(!isNaN(saved)) count = saved;
  document.getElementById('counter').textContent = count;
});

function addFeet(){
  count++;
  document.getElementById('counter').textContent = count;
  setCookie('feetCounter', count, 3650);
}

function resetCounter(){
  count = 0;
  document.getElementById('counter').textContent = count;
  setCookie('feetCounter', count, 3650);
}
</script>

</body>
</html>
